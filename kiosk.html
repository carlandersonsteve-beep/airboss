<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="AirBoss Kiosk">
    <meta name="theme-color" content="#8b1e2d">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/assets/icon-192.svg" type="image/svg+xml">
    <title>Mustang Aviation - Customer Check-In</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Smokum&family=Rye&family=Bowlby+One&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #3e2f23 url('https://images.pexels.com/photos/129733/pexels-photo-129733.jpeg?auto=compress&w=1920') center center;
            background-size: cover;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            z-index: 0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #root {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .mustang-logo {
            background: linear-gradient(135deg, #C41E3A 0%, #8B1528 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 3px solid #8b7355;
        }
        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #C41E3A 0%, #8B1528 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 30, 58, 0.3);
        }
        .btn-secondary {
            background: #c9a961;
            color: #333;
        }
        .btn-secondary:hover {
            background: #b89951;
        }
        .input-field {
            width: 100%;
            padding: 0.875rem;
            font-size: 1.125rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
        }
        .input-field:focus {
            outline: none;
            border-color: #C41E3A;
        }
        .service-option {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .service-option:hover {
            background: #f3f4f6;
        }
        .service-option.selected {
            border-color: #C41E3A;
            background: #fef2f2;
        }
        .service-option input[type="checkbox"] {
            width: 1.5rem;
            height: 1.5rem;
            margin-right: 1rem;
            cursor: pointer;
        }
        .progress-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .progress-step {
            flex: 1;
            height: 0.5rem;
            background: #e5e7eb;
            border-radius: 0.25rem;
        }
        .progress-step.active {
            background: #C41E3A;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="src/app/browserRuntime.js"></script>
    <script type="text/babel">
        const { useState } = React;
        const runtime = window.AirBossRuntime;
        const API_BASE_URL = `${window.location.protocol === 'file:' ? 'http://localhost:8787' : window.location.origin}`;

        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch((error) => {
                    console.log('Service worker registration failed', error.message);
                });
            });
        }

        const GOOGLE_FORMS_BACKUP_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSeDxs7v34X7iIreP2ZtzF31Ku8OspdbiS7pk-cxbvSadF6Iog/formResponse';

        const Storage = {
            get: (key) => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : null;
                } catch (e) {
                    return null;
                }
            },
            set: (key, value) => {
                localStorage.setItem(key, JSON.stringify(value));
            }
        };

        const syncAdapters = {
            async backupJsonPayload(type, payload) {
                try {
                    const formData = new FormData();
                    formData.append('entry.766632014', JSON.stringify({
                        type,
                        timestamp: new Date().toISOString(),
                        ...payload
                    }));
                    await fetch(GOOGLE_FORMS_BACKUP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    });
                } catch (error) {
                    console.log('Google Forms backup attempted (background)');
                }
            }
        };

        const api = {
            async request(path, options = {}) {
                const response = await fetch(`${API_BASE_URL}${path}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(options.headers || {}),
                    },
                    ...options,
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || `Request failed: ${response.status}`);
                }
                return payload;
            },

            createCustomer(customer) {
                return this.request('/customers', {
                    method: 'POST',
                    body: JSON.stringify(customer),
                });
            },

            createOrder(order) {
                return this.request('/orders', {
                    method: 'POST',
                    body: JSON.stringify(order),
                });
            },
        };

        const appendStoredRecord = (key, record) => {
            const current = Storage.get(key) || [];
            current.push(record);
            Storage.set(key, current);
            return record;
        };

        const buildKioskCustomerPayload = (formData) => runtime.customerService.createCustomerPayload({
            tailNumber: formData.tailNumber,
            aircraftType: formData.aircraftType,
            pilotName: formData.pilotName,
            email: formData.email,
            phone: formData.phone,
            company: formData.company,
            source: 'kiosk'
        });

        const buildKioskOrderPayload = (formData, customer) => runtime.orderService.createOrderPayload({
            customerId: customer.id,
            customerName: formData.pilotName,
            tailNumber: formData.tailNumber,
            aircraftType: formData.aircraftType,
            aircraft: formData.aircraftType,
            fuelType: formData.fuelType || '',
            fuelQuantity: parseInt(formData.fuelQuantity) || 0,
            fuelRequestedGallons: parseInt(formData.fuelQuantity) || 0,
            hangarOvernight: formData.hangarOvernight,
            services: formData.services,
            arrivalTime: new Date().toISOString(),
            purpose: formData.visitPurpose,
            source: 'kiosk-checkin',
            departureDate: formData.departureDate || '',
            departureTime: formData.departureTime || ''
        });

        const buildMarketingLeadPayload = (formData) => ({
            email: formData.email,
            name: formData.pilotName,
            tailNumber: formData.tailNumber,
            company: formData.company,
            signupDate: new Date().toISOString()
        });

        function CheckInKiosk() {
            const [step, setStep] = useState(0); // 0=welcome, 1=aircraft, 2=pilot, 3=services, 4=confirm, 5=success
            const [backendStatus, setBackendStatus] = useState('idle');
            const [submitError, setSubmitError] = useState('');
            const [formData, setFormData] = useState({
                tailNumber: '',
                aircraftType: '',
                pilotName: '',
                email: '',
                phone: '',
                company: '',
                visitPurpose: 'fuel_stop',
                fuelType: '',
                fuelQuantity: '',
                hangarOvernight: '', // Explicit Yes/No for liability
                services: [],
                marketingConsent: true,
                departureDate: '',
                departureTime: ''
            });

            const availableServices = [
                { id: 'lav', label: '🚽 Lavatory Service', icon: '🚽' },
                { id: 'gpu', label: '⚡ GPU (Ground Power)', icon: '⚡' },
                { id: 'oxygen', label: '🫁 Oxygen Service', icon: '🫁' },
                { id: 'deice', label: '❄️ De-icing', icon: '❄️' },
                { id: 'tiedown', label: '⛓️ Tiedown', icon: '⛓️' },
                { id: 'crew_car', label: '🚗 Crew Car', icon: '🚗' },
                { id: 'coffee', label: '☕ Coffee', icon: '☕' },
                { id: 'ice', label: '🧊 Ice', icon: '🧊' }
            ];

            // Auto-format phone number with dashes
            const formatPhoneNumber = (value) => {
                // Remove all non-digits
                const phoneNumber = value.replace(/\D/g, '');
                
                // Format as XXX-XXX-XXXX
                if (phoneNumber.length <= 3) {
                    return phoneNumber;
                } else if (phoneNumber.length <= 6) {
                    return `${phoneNumber.slice(0, 3)}-${phoneNumber.slice(3)}`;
                } else {
                    return `${phoneNumber.slice(0, 3)}-${phoneNumber.slice(3, 6)}-${phoneNumber.slice(6, 10)}`;
                }
            };

            const handlePhoneChange = (e) => {
                const formatted = formatPhoneNumber(e.target.value);
                setFormData({...formData, phone: formatted});
            };

            const toggleService = (serviceId) => {
                setFormData(prev => ({
                    ...prev,
                    services: prev.services.includes(serviceId)
                        ? prev.services.filter(s => s !== serviceId)
                        : [...prev.services, serviceId]
                }));
            };

            const handleSubmit = async () => {
                setSubmitError('');
                setBackendStatus('saving');

                const localCustomer = appendStoredRecord('fbo_customers', buildKioskCustomerPayload(formData));
                const localOrder = appendStoredRecord('fbo_orders', buildKioskOrderPayload(formData, localCustomer));

                if (formData.marketingConsent && formData.email) {
                    appendStoredRecord('marketing_list', buildMarketingLeadPayload(formData));
                }

                let savedCustomer = localCustomer;
                let savedOrder = localOrder;

                try {
                    const customerResponse = await api.createCustomer(localCustomer);
                    savedCustomer = customerResponse.item || localCustomer;

                    const backendOrderPayload = {
                        ...localOrder,
                        customerId: savedCustomer.id,
                    };
                    const orderResponse = await api.createOrder(backendOrderPayload);
                    savedOrder = orderResponse.item || backendOrderPayload;
                    setBackendStatus('local-file');
                } catch (error) {
                    console.log('Kiosk backend sync failed, kept locally', error.message);
                    setBackendStatus('local-fallback');
                    setSubmitError('Check-in saved locally. Shared sync is temporarily unavailable.');
                }

                await syncAdapters.backupJsonPayload('kiosk-checkin', {
                    customer: savedCustomer,
                    order: savedOrder,
                    marketingConsent: formData.marketingConsent,
                    backendStatus
                });

                setStep(5);
                
                // Auto-reset after 5 seconds
                setTimeout(() => {
                    setFormData({
                        tailNumber: '',
                        aircraftType: '',
                        pilotName: '',
                        email: '',
                        phone: '',
                        company: '',
                        visitPurpose: 'fuel_stop',
                        fuelType: '',
                        fuelQuantity: '',
                        hangarOvernight: '',
                        services: [],
                        marketingConsent: true,
                        departureDate: '',
                        departureTime: ''
                    });
                    setStep(0);
                    setSubmitError('');
                }, 5000);
            };

            // STEP 0: Welcome
            if (step === 0) {
                return (
                    <div className="glass-card" style={{borderRadius: '3rem', padding: '3rem', maxWidth: '800px', textAlign: 'center', border: '3px solid #8b7355'}}>
                        <div style={{marginBottom: '2rem'}}>

                        </div>
                        <h1 style={{fontSize: '3rem', fontWeight: 900, marginBottom: '2rem', color: '#4a392a', fontFamily: "'Rye', 'Smokum', cursive", letterSpacing: '1px', textTransform: 'uppercase'}}>

                        </h1>
                        <button className="btn btn-primary" style={{fontSize: '1.5rem', padding: '1.25rem 3rem'}}
                                onClick={() => setStep(1)}>
                            Start Check-In
                        </button>
                    </div>
                );
            }

            // STEP 1: Aircraft Info
            if (step === 1) {
                return (
                    <div className="glass-card" style={{borderRadius: '2rem', padding: '3rem', maxWidth: '600px', width: '100%'}}>
                        <div className="progress-bar">
                            <div className="progress-step active"></div>
                            <div className="progress-step"></div>
                            <div className="progress-step"></div>
                            <div className="progress-step"></div>
                        </div>
                        <h2 style={{fontSize: '2rem', fontWeight: 'bold', marginBottom: '2rem', color: '#1f2937'}}>
                            ✈️ Aircraft Information
                        </h2>
                        <div style={{marginBottom: '1.5rem'}}>
                            <label style={{fontWeight: 600, color: '#374151'}}>Tail Number *</label>
                            <input 
                                className="input-field"
                                placeholder="N12345"
                                value={formData.tailNumber}
                                onChange={(e) => setFormData({...formData, tailNumber: e.target.value.toUpperCase()})}
                            />
                        </div>
                        <div style={{marginBottom: '2rem'}}>
                            <label style={{fontWeight: 600, color: '#374151'}}>Aircraft Type *</label>
                            <input 
                                className="input-field"
                                placeholder="Citation CJ3"
                                value={formData.aircraftType}
                                onChange={(e) => setFormData({...formData, aircraftType: e.target.value})}
                            />
                        </div>
                        <div style={{display: 'flex', gap: '1rem'}}>
                            <button className="btn btn-secondary" onClick={() => setStep(0)}>← Back</button>
                            <button className="btn btn-primary" style={{flex: 1}}
                                    disabled={!formData.tailNumber || !formData.aircraftType}
                                    onClick={() => setStep(2)}>
                                Next →
                            </button>
                        </div>
                    </div>
                );
            }

            // STEP 2: Pilot Info
            if (step === 2) {
                return (
                    <div className="glass-card" style={{borderRadius: '2rem', padding: '3rem', maxWidth: '600px', width: '100%'}}>
                        <div className="progress-bar">
                            <div className="progress-step active"></div>
                            <div className="progress-step active"></div>
                            <div className="progress-step"></div>
                            <div className="progress-step"></div>
                        </div>
                        <h2 style={{fontSize: '2rem', fontWeight: 'bold', marginBottom: '2rem', color: '#1f2937'}}>

                        </h2>
                        <div style={{marginBottom: '1.5rem'}}>
                            <label style={{fontWeight: 600, color: '#374151'}}>Pilot Name *</label>
                            <input 
                                className="input-field"
                                placeholder="John Smith"
                                value={formData.pilotName}
                                onChange={(e) => setFormData({...formData, pilotName: e.target.value})}
                            />
                        </div>
                        <div style={{marginBottom: '1.5rem'}}>

                            <input 
                                className="input-field"
                                type="email"
                                placeholder="john@example.com"
                                value={formData.email}
                                onChange={(e) => setFormData({...formData, email: e.target.value})}
                            />
                        </div>
                        <div style={{marginBottom: '1.5rem'}}>
                            <label style={{fontWeight: 600, color: '#374151'}}>Phone *</label>
                            <input 
                                className="input-field"
                                placeholder="605-555-1234"
                                value={formData.phone}
                                onChange={handlePhoneChange}
                                maxLength="12"
                            />
                        </div>
                        <div style={{marginBottom: '2rem'}}>
                            <label style={{fontWeight: 600, color: '#374151'}}>Company (optional)</label>
                            <input 
                                className="input-field"
                                placeholder="Company name"
                                value={formData.company}
                                onChange={(e) => setFormData({...formData, company: e.target.value})}
                            />
                        </div>
                        <div style={{display: 'flex', gap: '1rem'}}>
                            <button className="btn btn-secondary" onClick={() => setStep(1)}>← Back</button>
                            <button className="btn btn-primary" style={{flex: 1}}
                                    disabled={!formData.pilotName || !formData.email || !formData.phone}
                                    onClick={() => setStep(3)}>
                                Next →
                            </button>
                        </div>
                    </div>
                );

            if (step === 3) {

                    <div className="glass-card" style={{borderRadius: '2rem', padding: '3rem', maxWidth: '700px', width: '100%'}}>

                                        placeholder="0"
                                        value={formData.fuelQuantity}
                                        onChange={(e) => setFormData({...formData, fuelQuantity: e.target.value})}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Hangar Overnight - Explicit Yes/No */}
                        <div style={{marginBottom: '2rem', padding: '1.5rem', background: '#f9fafb', borderRadius: '1rem'}}>
                            <h3 style={{fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem'}}>🏠 Hangar Overnight</h3>
                            <label style={{fontWeight: 600, color: '#374151', fontSize: '0.875rem', display: 'block', marginBottom: '0.5rem'}}>
                                Required for liability purposes *
                            </label>
                            <select 
                                className="input-field"
                                value={formData.hangarOvernight}
                                onChange={(e) => setFormData({...formData, hangarOvernight: e.target.value})}
                                style={{width: '100%'}}>
                                <option value="">Select option</option>
                                <option value="yes">✅ Yes - Hangar Overnight</option>
                                <option value="no">❌ No - Outside Parking</option>
                            </select>
                        </div>

                        {/* Departure Date & Time */}
                        <div style={{marginBottom: '2rem', padding: '1.5rem', background: '#f9fafb', borderRadius: '1rem'}}>
                            <h3 style={{fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem'}}>✈️ Planned Departure</h3>
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem'}}>
                                <div>
                                    <label style={{fontWeight: 600, color: '#374151', fontSize: '0.875rem', display: 'block', marginBottom: '0.5rem'}}>Departure Date</label>
                                    <input
                                        className="input-field"
                                        type="date"
                                        value={formData.departureDate}
                                        min={new Date().toISOString().split('T')[0]}
                                        onChange={(e) => setFormData({...formData, departureDate: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label style={{fontWeight: 600, color: '#374151', fontSize: '0.875rem', display: 'block', marginBottom: '0.5rem'}}>Departure Time</label>
                                    <input
                                        className="input-field"
                                        type="time"
                                        value={formData.departureTime}
                                        onChange={(e) => setFormData({...formData, departureTime: e.target.value})}
                                    />
                                </div>
                            </div>
                            <div style={{fontSize: '0.8rem', color: '#6b7280', marginTop: '0.5rem'}}>
                                Optional — helps us prepare your aircraft and send a courtesy reminder the day before.
                            </div>
                        </div>

                        {/* Additional Services */}
                        <h3 style={{fontSize: '1.25rem', fontWeight: 'bold', marginBottom: '1rem'}}>📋 Additional Services</h3>
                        <div style={{marginBottom: '2rem'}}>
                            {availableServices.map(service => (
                                <div 
                                    key={service.id}
                                    className={`service-option ${formData.services.includes(service.id) ? 'selected' : ''}`}
                                    onClick={() => toggleService(service.id)}>
                                    <input 
                                        type="checkbox"
                                        checked={formData.services.includes(service.id)}
                                        onChange={() => {}}
                                    />
                                    <span style={{fontSize: '1.125rem', fontWeight: 500}}>{service.label}</span>
                                </div>
                            ))}
                        </div>

                        <div style={{display: 'flex', gap: '1rem'}}>
                            <button className="btn btn-secondary" onClick={() => setStep(2)}>← Back</button>
                            <button className="btn btn-primary" style={{flex: 1}} onClick={() => setStep(4)}>
                                Review →
                            </button>
                        </div>
                    </div>
                );
            }

            // STEP 4: Confirmation
            if (step === 4) {
                return (
                    <div className="glass-card" style={{borderRadius: '2rem', padding: '3rem', maxWidth: '600px', width: '100%'}}>
                        <div className="progress-bar">
                            <div className="progress-step active"></div>
                            <div className="progress-step active"></div>
                            <div className="progress-step active"></div>
                            <div className="progress-step active"></div>
                        </div>
                        <h2 style={{fontSize: '2rem', fontWeight: 'bold', marginBottom: '2rem', color: '#1f2937'}}>
                            ✅ Confirm Your Request
                        </h2>
                        {submitError && (
                            <div style={{marginBottom: '1rem', padding: '0.9rem 1rem', borderRadius: '0.75rem', background: '#fef3c7', color: '#92400e', fontWeight: 600}}>
                                {submitError}
                            </div>
                        )}
                        
                        <div style={{background: '#f9fafb', padding: '1.5rem', borderRadius: '1rem', marginBottom: '1.5rem'}}>
                            <h3 style={{fontWeight: 'bold', marginBottom: '0.5rem'}}>Aircraft</h3>
                            <p>{formData.tailNumber} - {formData.aircraftType}</p>
                        </div>

                        <div style={{background: '#f9fafb', padding: '1.5rem', borderRadius: '1rem', marginBottom: '1.5rem'}}>
                            <h3 style={{fontWeight: 'bold', marginBottom: '0.5rem'}}>Pilot</h3>
                            <p>{formData.pilotName}</p>
                            <p style={{fontSize: '0.875rem', color: '#6b7280'}}>{formData.email} • {formData.phone}</p>
                        </div>

                        {formData.hangarOvernight && (
                            <div style={{background: formData.hangarOvernight === 'yes' ? '#ecfdf5' : '#fef2f2', padding: '1.5rem', borderRadius: '1rem', marginBottom: '1.5rem', border: '2px solid ' + (formData.hangarOvernight === 'yes' ? '#10b981' : '#ef4444')}}>
                                <h3 style={{fontWeight: 'bold', marginBottom: '0.5rem', color: formData.hangarOvernight === 'yes' ? '#10b981' : '#ef4444'}}>
                                    🏠 Hangar Overnight
                                </h3>
                                <p style={{fontSize: '1.125rem', fontWeight: 600}}>
                                    {formData.hangarOvernight === 'yes' ? '✅ YES - Hangar Overnight Requested' : '❌ NO - Outside Parking'}
                                </p>
                            </div>
                        )}

                        {(formData.fuelType || formData.services.length > 0) && (
                            <div style={{background: '#fef2f2', padding: '1.5rem', borderRadius: '1rem', marginBottom: '1.5rem'}}>
                                <h3 style={{fontWeight: 'bold', marginBottom: '0.5rem', color: '#C41E3A'}}>Services Requested</h3>
                                {formData.fuelType && (
                                    <p>⛽ {formData.fuelQuantity} gallons {formData.fuelType}</p>
                                )}
                                {formData.services.length > 0 && (
                                    <div>
                                        {formData.services.map(sid => {
                                            const svc = availableServices.find(s => s.id === sid);
                                            return <p key={sid}>{svc.icon} {svc.label.split(' ').slice(1).join(' ')}</p>;
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {formData.departureDate && (
                            <div style={{background: '#eff6ff', padding: '1.5rem', borderRadius: '1rem', marginBottom: '1.5rem', border: '2px solid #3b82f6'}}>
                                <h3 style={{fontWeight: 'bold', marginBottom: '0.5rem', color: '#1d4ed8'}}>✈️ Planned Departure</h3>
                                <p style={{fontSize: '1.125rem', fontWeight: 600}}>
                                    {new Date(formData.departureDate + 'T12:00:00').toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric'})}
                                    {formData.departureTime && (() => { const [h,m] = formData.departureTime.split(':'); const ampm = h >= 12 ? 'PM' : 'AM'; return ' at ' + ((h % 12) || 12) + ':' + m + ' ' + ampm; })()}
                                </p>
                                <p style={{fontSize: '0.8rem', color: '#6b7280', marginTop: '0.25rem'}}>We'll send a courtesy email the day before your departure.</p>
                            </div>
                        )}

                        <div style={{marginBottom: '2rem'}}>
                            <label style={{display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer'}}>
                                <input 
                                    type="checkbox"
                                    checked={formData.marketingConsent}
                                    onChange={(e) => setFormData({...formData, marketingConsent: e.target.checked})}
                                    style={{width: '1.25rem', height: '1.25rem'}}
                                />
                                <span style={{fontSize: '0.875rem', color: '#6b7280'}}>
                                    Send me occasional updates and offers
                                </span>
                            </label>
                        </div>

                        <div style={{display: 'flex', gap: '1rem'}}>
                            <button className="btn btn-secondary" onClick={() => setStep(3)}>← Back</button>
                            <button className="btn btn-primary" style={{flex: 1}} onClick={handleSubmit}>
                                ✅ Confirm Check-In
                            </button>
                        </div>
                    </div>
                );
            }

            // STEP 5: Success
            if (step === 5) {
                return (
                    <div className="glass-card" style={{borderRadius: '2rem', padding: '3rem', maxWidth: '600px', textAlign: 'center'}}>
                        <div style={{fontSize: '5rem', marginBottom: '1rem'}}>✅</div>
                        <h2 style={{fontSize: '2.5rem', fontWeight: 'bold', marginBottom: '1rem', color: '#059669'}}>
                            Check-In Complete!
                        </h2>
                        <div style={{marginBottom: '1rem', display: 'inline-block', padding: '0.6rem 1rem', borderRadius: '999px', background: backendStatus === 'connected' ? '#dcfce7' : '#fef3c7', color: backendStatus === 'connected' ? '#166534' : '#92400e', fontWeight: 700}}>
                            {backendStatus === 'connected' ? 'Backend saved successfully' : 'Saved locally — shared sync pending'}
                        </div>
                        <p style={{fontSize: '1.5rem', fontWeight: 600, marginBottom: '0.5rem'}}>
                            Welcome to Mustang Aviation
                        </p>
                        <p style={{fontSize: '1.125rem', color: '#c9a961', fontWeight: 600, marginBottom: '1rem'}}>
                            "Where the Midwest Meets the Wild West"
                        </p>
                        <p style={{fontSize: '1rem', color: '#6b7280'}}>
                            Our ramp crew has been notified and will begin your service shortly.
                        </p>
                    </div>
                );
            }
        }

        ReactDOM.render(<CheckInKiosk />, document.getElementById('root'));
    </script>
</body>
</html>
