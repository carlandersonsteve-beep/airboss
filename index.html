                c.tailNumber?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                c.ownerName?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                c.pilotName?.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold text-gray-800">Customer Database</h2>
                        <button
                            onClick={onNewCustomer}
                            className="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-medium shadow-lg transition"
                        >
                            + New Customer
                        </button>
                    </div>

                    {/* Search */}
                    <div className="bg-white rounded-lg shadow p-4 mb-6">
                        <input
                            type="text"
                            placeholder="Search by tail number, owner, or pilot name..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent"
                        />
                    </div>

                    {/* Customer Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredCustomers.length === 0 ? (
                            <div className="col-span-full text-center py-12 text-gray-500">
                                {searchTerm ? 'No customers found' : 'No customers yet. Add your first customer!'}
                            </div>
                        ) : (
                            filteredCustomers.map(customer => {
                                const customerOrders = orders.filter(o => o.customerId === customer.id);
                                return (
                                    <div key={customer.id} className="bg-white rounded-lg shadow-lg p-6 hover:shadow-xl transition">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <div className="text-2xl font-bold mustang-red-text">{customer.tailNumber}</div>
                                                <div className="text-gray-600">{customer.aircraftType}</div>
                                            </div>
                                            <span className="mustang-red text-white px-2 py-1 rounded text-xs font-medium">
                                                {customerOrders.length} orders
                                            </span>
                                        </div>
                                        
                                        <div className="space-y-2 text-sm">
                                            {customer.ownerName && (
                                                <div>
                                                    <span className="font-medium text-gray-700">Owner:</span>
                                                    <span className="text-gray-600 ml-2">{customer.ownerName}</span>
                                                </div>
                                            )}
                                            {customer.pilotName && (
                                                <div>
                                                    <span className="font-medium text-gray-700">Pilot:</span>
                                                    <span className="text-gray-600 ml-2">{customer.pilotName}</span>
                                                </div>
                                            )}
                                            {customer.phone && (
                                                <div>
                                                    <span className="font-medium text-gray-700">Phone:</span>
                                                    <span className="text-gray-600 ml-2">{customer.phone}</span>
                                                </div>
                                            )}
                                            {customer.email && (
                                                <div>
                                                    <span className="font-medium text-gray-700">Email:</span>
                                                    <span className="text-gray-600 ml-2">{customer.email}</span>
                                                </div>
                                            )}
                                            {customer.company && (
                                                <div>
                                                    <span className="font-medium text-gray-700">Company:</span>
                                                    <span className="text-gray-600 ml-2">{customer.company}</span>
                                                </div>
                                            )}
                                            {customer.homeBase && (
                                                <div>
                                                    <span className="font-medium text-gray-700">Home Base:</span>
                                                    <span className="text-gray-600 ml-2">{customer.homeBase}</span>
                                                </div>
                                            )}
                                        </div>

                                        {customer.notes && (
                                            <div className="mt-4 p-3 bg-gray-50 rounded text-sm">
                                                <span className="font-medium text-gray-700">Notes:</span>
                                                <p className="text-gray-600 mt-1">{customer.notes}</p>
                                            </div>
                                        )}
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        }

        // Phone auto-format helper
        const formatPhone = (value) => {
            const digits = value.replace(/\D/g, '').slice(0, 10);
            if (digits.length <= 3) return digits;
            if (digits.length <= 6) return digits.slice(0,3) + '-' + digits.slice(3);
            return digits.slice(0,3) + '-' + digits.slice(3,6) + '-' + digits.slice(6);
        };

        function CustomerModal({ onClose, onSave, customer }) {
            const [formData, setFormData] = useState({
                tailNumber: customer?.tailNumber || '',
                aircraftType: customer?.aircraftType || '',
                ownerName: customer?.ownerName || '',
                pilotName: customer?.pilotName || '',
                phone: customer?.phone || '',
                email: customer?.email || '', // blank = girl types it in manually
                company: customer?.company || '',
                homeBase: customer?.homeBase || '',
                notes: customer?.notes || ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.tailNumber) {
                    alert('Tail number is required');
                    return;
                }
                onSave(formData);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="p-6">
                            <h3 className="text-2xl font-bold mb-6 text-gray-800">
                                {customer ? 'Edit Customer' : 'New Customer'}
                            </h3>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Tail Number *
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.tailNumber}
                                            onChange={(e) => setFormData({...formData, tailNumber: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            placeholder="N12345"
                                            required
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Aircraft Type
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.aircraftType}
                                            onChange={(e) => setFormData({...formData, aircraftType: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            placeholder="Citation CJ3"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Owner Name
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.ownerName}
                                            onChange={(e) => setFormData({...formData, ownerName: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Pilot Name
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.pilotName}
                                            onChange={(e) => setFormData({...formData, pilotName: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Phone
                                        </label>
                                        <input
                                            type="tel"
                                            value={formData.phone}
                                            onChange={(e) => setFormData({...formData, phone: formatPhone(e.target.value)})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            placeholder="605-555-1234"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Email
                                        </label>
                                        <input
                                            type="email"
                                            value={formData.email}
                                            onChange={(e) => setFormData({...formData, email: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Company
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.company}
                                            onChange={(e) => setFormData({...formData, company: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Home Base
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.homeBase}
                                            onChange={(e) => setFormData({...formData, homeBase: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            placeholder="KJFK"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">
                                        Notes / Preferences
                                    </label>
                                    <textarea
                                        value={formData.notes}
                                        onChange={(e) => setFormData({...formData, notes: e.target.value})}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        rows="3"
                                        placeholder="Preferred fuel type, special requests, etc."
                                    />
                                </div>

                                <div className="flex gap-3 pt-4">
                                    <button
                                        type="submit"
                                        className="flex-1 mustang-red mustang-red-hover text-white px-6 py-3 rounded-lg font-medium transition"
                                    >
                                        Save Customer
                                    </button>
                                    <button
                                        type="button"
                                        onClick={onClose}
                                        className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg font-medium transition"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function OrderModal({ customers, selectedCustomer, onClose, onSave, onNewCustomer }) {
            const [formData, setFormData] = useState({
                customerId: selectedCustomer?.id || '',
                fuelType: '',
                fuelQuantity: '',
                hangar: '',
                services: [],
                notes: '',
                departureDate: '',
                departureTime: ''
            });

            const serviceOptions = ['GPU', 'Lavatory', 'Water', 'Catering', 'De-icing', 'Oxygen', 'Tow', 'Coffee', 'Ice'];

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.customerId) {
                    alert('Please select a customer');
                    return;
                }
                onSave(formData);
            };

            const toggleService = (service) => {
                setFormData({
                    ...formData,
                    services: formData.services.includes(service)
                        ? formData.services.filter(s => s !== service)
                        : [...formData.services, service]
                });
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="p-6">
                            <h3 className="text-2xl font-bold mb-6 text-gray-800">Aircraft Arrival / New Order</h3>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">
                                        Customer / Aircraft *
                                    </label>
                                    <div className="flex gap-2">
                                        <select
                                            value={formData.customerId}
                                            onChange={(e) => setFormData({...formData, customerId: e.target.value})}
                                            className="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            required
                                        >
                                            <option value="">Select Aircraft...</option>
                                            {customers.map(c => (
                                                <option key={c.id} value={c.id}>
                                                    {c.tailNumber} - {c.aircraftType} ({c.ownerName || c.pilotName})
                                                </option>
                                            ))}
                                        </select>
                                        <button
                                            type="button"
                                            onClick={onNewCustomer}
                                            className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition"
                                        >
                                            + New
                                        </button>
                                    </div>
                                </div>

                                <div className="border-t pt-4">
                                    <h4 className="font-bold text-gray-800 mb-3">Fuel Order</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                Fuel Type
                                            </label>
                                            <select
                                                value={formData.fuelType}
                                                onChange={(e) => setFormData({...formData, fuelType: e.target.value})}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="">None</option>
                                                <option value="JET-A">JET-A</option>
                                                <option value="100LL">100LL</option>
                                            </select>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                Quantity (gallons)
                                            </label>
                                            <input
                                                type="number"
                                                value={formData.fuelQuantity}
                                                onChange={(e) => setFormData({...formData, fuelQuantity: e.target.value})}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="0"
                                                disabled={!formData.fuelType}
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="border-t pt-4">
                                    <h4 className="font-bold text-gray-800 mb-3">Hangar</h4>
                                    <select
                                        value={formData.hangar}
                                        onChange={(e) => setFormData({...formData, hangar: e.target.value})}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option value="">No Hangar</option>
                                        <option value="Transient">Transient</option>
                                        <option value="Overnight">Overnight</option>
                                    </select>
                                </div>

                                <div className="border-t pt-4">
                                    <h4 className="font-bold text-gray-800 mb-3">Services</h4>
                                    <div className="grid grid-cols-3 gap-2">
                                        {serviceOptions.map(service => (
                                            <button
                                                key={service}
                                                type="button"
                                                onClick={() => toggleService(service)}
                                                className={`px-3 py-2 rounded-lg font-medium transition ${
                                                    formData.services.includes(service)
                                                    ? 'mustang-red text-white'
                                                    : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                                }`}
                                            >
                                                {service}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="border-t pt-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">
                                        Notes / Special Requests
                                    </label>
                                    <textarea
                                        value={formData.notes}
                                        onChange={(e) => setFormData({...formData, notes: e.target.value})}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        rows="3"
                                        placeholder="Any special instructions..."
                                    />
                                </div>

                                <div className="flex gap-3 pt-4">
                                    <button
                                        type="submit"
                                        className="flex-1 mustang-red mustang-red-hover text-white px-6 py-3 rounded-lg font-medium transition"
                                    >
                                        Create Order
                                    </button>
                                    <button
                                        type="button"
                                        onClick={onClose}
                                        className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg font-medium transition"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function QuickFuelModal({ customers, orders, onClose, addTicket }) {
            const [selectedOrder, setSelectedOrder] = useState('');
            const [fuelQuantity, setFuelQuantity] = useState('');
            const [notes, setNotes] = useState('');

            // Get only in-progress orders with fuel
            const activeOrders = orders.filter(o => 
                isInProgressStatus(o.status) && o.fuelType
            );

            const handleSubmit = (e) => {
                e.preventDefault();
                
                const order = orders.find(o => o.id === selectedOrder);
                if (!order) {
                    alert('Please select an order');
                    return;
                }

                const customer = customers.find(c => c.id === order.customerId);
                
                addTicket({
                    type: 'fueling_complete',
                    orderId: order.id,
                    customerId: order.customerId,
                    tailNumber: customer?.tailNumber,
                    aircraftType: customer?.aircraftType,
                    fuelType: order.fuelType,
                    fuelQuantity: fuelQuantity || order.fuelQuantity,
                    message: `Fueling complete: ${fuelQuantity || order.fuelQuantity} gal ${order.fuelType}${notes ? ' - ' + notes : ''}`,
                    submittedBy: 'Line Service',
                    notes: notes
                });

                alert('Front desk notified!');
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-md w-full">
                        <div className="p-6">
                            <h3 className="text-2xl font-bold mb-4 text-gray-800">⚡ Quick Fuel Entry</h3>
                            <p className="text-gray-600 mb-6">Notify front desk that fueling is complete</p>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Select Aircraft *
                                    </label>
                                    <select
                                        value={selectedOrder}
                                        onChange={(e) => {
                                            setSelectedOrder(e.target.value);
                                            const order = orders.find(o => o.id === e.target.value);
                                            if (order) setFuelQuantity(order.fuelQuantity || '');
                                        }}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent text-lg"
                                        required
                                    >
                                        <option value="">Choose aircraft...</option>
                                        {activeOrders.map(order => {
                                            const customer = customers.find(c => c.id === order.customerId);
                                            return (
                                                <option key={order.id} value={order.id}>
                                                    {customer?.tailNumber} - {order.fuelType}
                                                </option>
                                            );
                                        })}
                                    </select>
                                    {activeOrders.length === 0 && (
                                        <p className="text-sm text-gray-500 mt-2">No active fuel orders</p>
                                    )}
                                </div>

                                {selectedOrder && (
                                    <>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Fuel Quantity (gallons) *
                                            </label>
                                            <input
                                                type="number"
                                                value={fuelQuantity}
                                                onChange={(e) => setFuelQuantity(e.target.value)}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent text-lg"
                                                placeholder="Enter gallons"
                                                required
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Notes (optional)
                                            </label>
                                            <textarea
                                                value={notes}
                                                onChange={(e) => setNotes(e.target.value)}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent text-lg"
                                                rows="2"
                                                placeholder="Any issues or special notes..."
                                            />
                                        </div>
                                    </>
                                )}

                                <div className="flex gap-3 pt-4">
                                    <button
                                        type="submit"
                                        disabled={!selectedOrder}
                                        className="flex-1 mustang-red mustang-red-hover text-white px-6 py-4 rounded-lg font-bold text-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        📢 Notify Front Desk
                                    </button>
                                    <button
                                        type="button"
                                        onClick={onClose}
                                        className="px-6 py-4 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-medium transition"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<FBOSystem />, document.getElementById('root'));
    </script>
</body>
</html>
