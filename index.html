<body class="bg-gray-50">
    <div id="root"></div>

    <script src="src/app/browserRuntime.js"></script>
    <script src="src/ui/ops/components/componentBridge.js?v=20260322e"></script>
    <script type="text/babel" src="src/ui/ops/components/OrderMessageThread.js?v=20260322e"></script>
    <script type="text/babel" src="src/ui/ops/components/CompletionModal.js?v=20260322e"></script>
    <script type="text/babel" src="src/ui/ops/components/OrderCard.js?v=20260322e"></script>
    <script type="text/babel" src="src/ui/ops/components/RampView.js?v=20260322e"></script>
    <script type="text/babel" src="src/ui/ops/components/OfficeView.js?v=20260322e"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxbymVS5_yCkKIZx49fJT1LtVM3ToI05dt_upjif3qFKj2zLENnf3mTLMflABkJepDC7A/exec';
        const GOOGLE_FORMS_BACKUP_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSeDxs7v34X7iIreP2ZtzF31Ku8OspdbiS7pk-cxbvSadF6Iog/formResponse';

        // Sync bridge helpers — still local-first, but sync behavior is centralized here.
        const syncAdapters = {
            async syncToSheets(action, data) {
                try {
                    await fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, ...data })
                    });
                } catch (error) {
                    console.log('Google Sheets sync attempted (background)');
                }
            },

            async backupJsonPayload(type, payload) {
                try {
                    const formData = new FormData();
                    formData.append('entry.766632014', JSON.stringify({
                        type,
                        timestamp: new Date().toISOString(),
                        ...payload
                    }));
                    await fetch(GOOGLE_FORMS_BACKUP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    });
                } catch (error) {
                    console.log('Google Forms backup attempted (background)');
                }
            }
        };

        // Storage helper
        const Storage = {
            get: (key) => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : null;
                } catch (e) {
                    return null;
                }
            },
            set: (key, value) => {
                localStorage.setItem(key, JSON.stringify(value));
            },
            remove: (key) => {
                localStorage.removeItem(key);
            }
        };

        const API_BASE_URL = `${window.location.protocol === 'file:' ? 'http://localhost:8787' : window.location.origin}`;
        const SESSION_KEY = 'airboss_session';

        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', async () => {
                try {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map((reg) => reg.unregister()));
                    if (window.caches?.keys) {
                        const keys = await window.caches.keys();
                        await Promise.all(keys.map((key) => window.caches.delete(key)));
                    }
                    console.log('Local dev: cleared old service workers and caches');
                } catch (error) {
                    console.log('Service worker cleanup failed', error.message);
                }
            });
        }

        const api = {
            async request(path, options = {}) {
                const response = await fetch(`${API_BASE_URL}${path}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(options.headers || {}),
                    },
                    ...options,
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || `Request failed: ${response.status}`);
                }
                return payload;
            },

            bootstrap() {
                return this.request('/bootstrap');
            },

            createCustomer(customer) {
                return this.request('/customers', {
                    method: 'POST',
                    body: JSON.stringify(customer),
                });
            },

            createOrder(order) {
                return this.request('/orders', {
                    method: 'POST',
                    body: JSON.stringify(order),
                });
            },

            postOrderMessage(orderId, payload) {
                return this.request(`/orders/${orderId}/messages`, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                });
            },

            createAlert(alert) {
                return this.request('/alerts', {
                    method: 'POST',
                    body: JSON.stringify(alert),
                });
            },

            resolveAlert(alertId) {
                return this.request(`/alerts/${alertId}/resolve`, {
                    method: 'POST',
                });
            },

            deleteAlert(alertId) {
                return this.request(`/alerts/${alertId}`, {
                    method: 'DELETE',
                });
            },

            updateOrder(orderId, patch) {
                return this.request(`/orders/${orderId}`, {
                    method: 'PATCH',
                    body: JSON.stringify(patch),
                });
            },

            markOrderThreadRead(orderId, role, lastReadAt = Date.now()) {
                return this.request(`/orders/${orderId}/read`, {
                    method: 'POST',
                    body: JSON.stringify({ role, lastReadAt }),
                });
            },

            login(username, password) {
                return this.request('/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password }),
                });
            },

            changePassword(username, currentPassword, newPassword) {
                return this.request('/change-password', {
                    method: 'POST',
                    body: JSON.stringify({ username, currentPassword, newPassword }),
                });
            },
        };

        const runtime = window.AirBossRuntime;
        const getExtractedComponent = (name) => {
            const component = window.AirBossComponents && window.AirBossComponents[name];
            if (!component) {
                throw new Error(`Missing extracted component: ${name}`);
            }
            return component;
        };
        const normalizeOrderStatus = (status) => runtime.normalizeOrderStatus(status);

        const isPendingStatus = (status) => normalizeOrderStatus(status) === 'pending';
        const isInProgressStatus = (status) => normalizeOrderStatus(status) === 'in_progress';
        const isReadyStatus = (status) => normalizeOrderStatus(status) === 'ready_for_front_desk';
        const isClosedStatus = (status) => normalizeOrderStatus(status) === 'closed';
        const isActiveRampStatus = (status) => isPendingStatus(status) || isInProgressStatus(status);
        const getTodayOrders = (orders, now = new Date()) => runtime.orderSelectors.today(orders, now);
        const getActiveRampOrders = (orders, now = new Date()) => runtime.orderSelectors.activeRamp(orders, now);
        const getReadyForFrontDeskOrders = (orders) => runtime.orderSelectors.readyForFrontDesk(orders);
        const getClosedOrders = (orders) => runtime.orderSelectors.closed(orders);
        const getWeekOrders = (orders, now = new Date()) => runtime.orderSelectors.thisWeek(orders, now);
        const getFuelTotal = (orders, fuelType) => (
            fuelType === 'JET-A' ? runtime.orderSelectors.jetATotal(orders) : runtime.orderSelectors.avgasTotal(orders)
        );

        const buildExportSnapshot = ({ customers, orders, tickets, messages }) => ({
            customers,
            orders,
            tickets,
            messages,
            exportDate: new Date().toISOString(),
            version: '1.0'
        });

        function FBOSystem() {
            const [session, setSession] = useState(() => Storage.get(SESSION_KEY));
            const [authError, setAuthError] = useState('');
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [passwordSetup, setPasswordSetup] = useState({ newPassword: '', confirmPassword: '' });
            const [view, setView] = useState('ramp'); // 'ramp', 'office', 'customers', 'chat'
            const [customers, setCustomers] = useState([]);
            const [orders, setOrders] = useState([]);
            const [tickets, setTickets] = useState([]);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [showNewCustomer, setShowNewCustomer] = useState(false);
            const [showNewOrder, setShowNewOrder] = useState(false);
            const [showQuickFuel, setShowQuickFuel] = useState(false);

            // === MESSAGING FEATURE START ===
            const [messages, setMessages] = useState([]);
            const [lastReadChat, setLastReadChat] = useState(() => Storage.get('fbo_last_read_chat') || 0);
            const [orderThreadReadState, setOrderThreadReadState] = useState(() => Storage.get('fbo_order_thread_reads') || { RAMP: {}, OFFICE: {} });
            const [backendMode, setBackendMode] = useState('unknown');
            const markBackendWriteSuccess = () => setBackendMode((current) => current === 'local' ? 'local' : 'postgres');
            const currentRole = session?.role || 'OFFICE';
            // === MESSAGING FEATURE END ===

            // Load data on mount
            useEffect(() => {
                const savedCustomers = Storage.get('fbo_customers') || [];
                const savedOrders = Storage.get('fbo_orders') || [];
                const savedTickets = Storage.get('fbo_tickets') || [];
                const savedMessages = Storage.get('fbo_messages') || [];
                const savedReads = Storage.get('fbo_order_thread_reads') || { RAMP: {}, OFFICE: {} };

                setCustomers(savedCustomers);
                setOrders(savedOrders);
                setTickets(savedTickets);
                setMessages(savedMessages);
                setOrderThreadReadState(savedReads);

                let cancelled = false;

                const loadBootstrap = async () => {
                    try {
                        const data = await api.bootstrap();
                        if (cancelled) return;
                        setBackendMode(data.mode || 'postgres');
                        setCustomers(data.customers || []);
                        setOrders(data.orders || []);
                        setTickets(data.alerts || []);
                        setMessages(data.messages || []);
                        setOrderThreadReadState(data.threadReads || { RAMP: {}, OFFICE: {} });
                    } catch (error) {
                        if (cancelled) return;
                        console.log('AirBoss backend bootstrap unavailable, using local cache', error.message);
                        setBackendMode('local-fallback');
                    }
                };

                loadBootstrap();
                const intervalId = window.setInterval(loadBootstrap, 2000);

                return () => {
                    cancelled = true;
                    window.clearInterval(intervalId);
                };
            }, []);

            // Save data when it changes
            useEffect(() => {
                Storage.set('fbo_customers', customers);
            }, [customers]);

            useEffect(() => {
                Storage.set('fbo_orders', orders);
            }, [orders]);

            useEffect(() => {
                Storage.set('fbo_tickets', tickets);
            }, [tickets]);

            // === MESSAGING FEATURE START ===
            useEffect(() => {
                Storage.set('fbo_messages', messages);
            }, [messages]);

            useEffect(() => {
                Storage.set('fbo_order_thread_reads', orderThreadReadState);
            }, [orderThreadReadState]);

            const createMessageRecord = (text, sender, orderId = null, tailNumber = null) => (
                runtime.messageService.createMessagePayload({ text, senderRole: sender, orderId, tailNumber })
            );

            const appendMessageRecord = (messageRecord) => {
                setMessages(prev => [...prev, messageRecord]);
                return messageRecord;
            };

            const addMessage = async (text, sender, orderId = null, tailNumber = null) => {
                const messageRecord = appendMessageRecord(createMessageRecord(text, sender, orderId, tailNumber));
                if (orderId) {
                    try {
                        const response = await api.postOrderMessage(orderId, {
                            ...messageRecord,
                            senderRole: sender,
                        });
                        setMessages(prev => prev.map(m => m.id === messageRecord.id ? response.item : m));
                        markBackendWriteSuccess();
                    } catch (error) {
                        console.log('Order message backend sync failed, kept locally', error.message);
                    }
                }
                return messageRecord;
            };

            const markChatRead = () => {
                const now = Date.now();
                setLastReadChat(now);
                Storage.set('fbo_last_read_chat', now);
            };

            const handleLogin = async () => {
                setAuthError('');
                try {
                    const response = await api.login(loginForm.username.trim(), loginForm.password);
                    setSession(response.user);
                    Storage.set(SESSION_KEY, response.user);
                    if (response.user.mustChangePassword) return;
                    if (response.user.role === 'ADMIN') setView('office');
                    if (response.user.role === 'RAMP') setView('ramp');
                    if (response.user.role === 'OFFICE') setView('office');
                    if (response.user.role === 'KIOSK') window.location.href = '/kiosk';
                } catch (error) {
                    setAuthError(error.message || 'Login failed');
                }
            };

            const handlePasswordChange = async () => {
                setAuthError('');
                if (!passwordSetup.newPassword || passwordSetup.newPassword.length < 8) {
                    setAuthError('New password must be at least 8 characters.');
                    return;
                }
                if (passwordSetup.newPassword !== passwordSetup.confirmPassword) {
                    setAuthError('Passwords do not match.');
                    return;
                }

                try {
                    const response = await api.changePassword(loginForm.username.trim(), loginForm.password, passwordSetup.newPassword);
                    setSession(response.user);
                    Storage.set(SESSION_KEY, response.user);
                    setLoginForm(prev => ({ ...prev, password: passwordSetup.newPassword }));
                    setPasswordSetup({ newPassword: '', confirmPassword: '' });
                    if (response.user.role === 'ADMIN') setView('office');
                    if (response.user.role === 'RAMP') setView('ramp');
                    if (response.user.role === 'OFFICE') setView('office');
                    if (response.user.role === 'KIOSK') window.location.href = '/kiosk';
                } catch (error) {
                    setAuthError(error.message || 'Password update failed');
                }
            };

            const handleLogout = () => {
                setSession(null);
                Storage.remove(SESSION_KEY);
            };

            const markOrderThreadRead = async (role, orderId) => {
                if (!role || !orderId) return;
                const now = Date.now();
                setOrderThreadReadState(prev => ({
                    ...prev,
                    [role]: {
                        ...(prev[role] || {}),
                        [orderId]: now,
                    },
                }));
                try {
                    await api.markOrderThreadRead(orderId, role, now);
                    markBackendWriteSuccess();
                } catch (error) {
                    console.log('Thread read sync failed, kept locally', error.message);
                }
            };

            const getUnreadOrderThreadCount = (role, orderId) => {
                if (!role || !orderId) return 0;
                const lastReadAt = (orderThreadReadState[role] && orderThreadReadState[role][orderId]) || 0;
                return (messages || []).filter(message => (
                    message.orderId === orderId &&
                    message.sender !== role &&
                    new Date(message.createdAt).getTime() > lastReadAt
                )).length;
            };
            // === MESSAGING FEATURE END ===

            const roleAllows = (role, targetView) => {
                if (role === 'ADMIN' || role === 'STEVE') return ['ramp', 'office', 'chat', 'calendar'].includes(targetView);
                if (role === 'RAMP') return ['ramp', 'chat'].includes(targetView);
                if (role === 'OFFICE') return ['office', 'chat', 'calendar'].includes(targetView);
                if (role === 'KIOSK') return false;
                return false;
            };

            const createCustomerRecord = (customer) => runtime.customerService.createCustomerPayload(customer);

            const addCustomer = async (customer) => {
                const newCustomer = createCustomerRecord(customer);
                setCustomers(prev => [...prev, newCustomer]);
                syncAdapters.syncToSheets('addCustomer', { customer: newCustomer });
                try {
                    const response = await api.createCustomer(newCustomer);
                    setCustomers(prev => prev.map(c => c.id === newCustomer.id ? response.item : c));
                    markBackendWriteSuccess();
                } catch (error) {
                    console.log('Customer backend sync failed, kept locally', error.message);
                }
                return newCustomer;
            };

            const updateCustomer = (id, updates) => {
                setCustomers(prev => prev.map(c => c.id === id ? runtime.customerService.updateCustomer(c, updates) : c));
            };

            const createOrderRecord = (order) => runtime.orderService.createOrderPayload(order);

            const persistOrderPatch = (orderId, patch) => {
                setOrders(currentOrders => currentOrders.map(o => o.id === orderId ? { ...o, ...patch } : o));
            };

            const markPreDepartureSent = (orderId) => {
                persistOrderPatch(orderId, { preDepartureSent: true });
            };

            const backupOrderUpdate = (updatedOrder) => {
                syncAdapters.backupJsonPayload('order-update', { order: updatedOrder });
            };

            const transitionOrder = async (orderId, transitionFn) => {
                let updatedOrder = null;
                setOrders(currentOrders => currentOrders.map(o => {
                    if (o.id !== orderId) return o;
                    updatedOrder = transitionFn(o);
                    backupOrderUpdate(updatedOrder);
                    return updatedOrder;
                }));

                if (updatedOrder) {
                    try {
                        const response = await api.updateOrder(orderId, updatedOrder);
                        setOrders(prev => prev.map(o => o.id === orderId ? response.item : o));
                        markBackendWriteSuccess();
                    } catch (error) {
                        console.log('Order backend sync failed, kept locally', error.message);
                    }
                }
            };

            const startOrderService = (orderId) => {
                transitionOrder(orderId, (order) => runtime.orderService.startService(order));
            };

            const markOrderReadyForFrontDesk = (orderId, extraFields = {}) => {
                transitionOrder(orderId, (order) => runtime.orderService.completeService(order, extraFields));
            };

            const closeOrder = (orderId) => {
                transitionOrder(orderId, (order) => runtime.orderService.closeOrder(order));
            };

            const addOrder = async (order) => {
                const newOrder = createOrderRecord(order);
                setOrders(prev => [...prev, newOrder]);
                setShowNewOrder(false);
                setSelectedCustomer(null);
                syncAdapters.syncToSheets('addOrder', { order: newOrder });
                try {
                    const response = await api.createOrder(newOrder);
                    setOrders(prev => prev.map(o => o.id === newOrder.id ? response.item : o));
                    markBackendWriteSuccess();
                } catch (error) {
                    console.log('Order backend sync failed, kept locally', error.message);
                }
            };

            const updateOrderStatus = (orderId, status, extraFields = {}) => {
                transitionOrder(orderId, (order) => runtime.orderService.transition(order, status, extraFields));
            };

            // Recall function - moves order back one step in workflow
            const recallOrder = (orderId) => {
                transitionOrder(orderId, (order) => runtime.orderService.recallOrder(order));
            };

            const createTicketRecord = (ticket) => runtime.ticketService.createTicketPayload(ticket);

            const addTicket = async (ticket) => {
                const newTicket = createTicketRecord(ticket);
                setTickets(prev => [...prev, newTicket]);
                try {
                    const response = await api.createAlert(newTicket);
                    setTickets(prev => prev.map(t => t.id === newTicket.id ? response.item : t));
                    markBackendWriteSuccess();
                } catch (error) {
                    console.log('Alert backend sync failed, kept locally', error.message);
                }
                return newTicket;
            };

            const resolveTicket = async (ticketId) => {
                setTickets(prev => prev.map(t => t.id === ticketId ? runtime.ticketService.resolveTicket(t) : t));
                try {
                    const response = await api.resolveAlert(ticketId);
                    setTickets(prev => prev.map(t => t.id === ticketId ? response.item : t));
                    markBackendWriteSuccess();
                } catch (error) {
                    console.log('Alert resolve sync failed, kept locally', error.message);
                }
            };

            const deleteTicket = async (ticketId) => {
                setTickets(prev => prev.filter(t => t.id !== ticketId));
                try {
                    await api.deleteAlert(ticketId);
                    markBackendWriteSuccess();
                } catch (error) {
                    console.log('Alert delete sync failed after local removal', error.message);
                }
            };

            const exportData = () => {
                const data = buildExportSnapshot({ customers, orders, tickets, messages });
                
                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `mustang-aviation-backup-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                alert('Data exported successfully!');
            };

            const importData = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const importedData = JSON.parse(event.target.result);
                            
                            if (confirm('This will replace all current data. Are you sure?')) {
                                setCustomers(importedData.customers || []);
                                setOrders(importedData.orders || []);
                                setTickets(importedData.tickets || []);
                                setMessages(importedData.messages || []);
                                alert('Data imported successfully!');
                            }
                        } catch (error) {
                            alert('Error importing data: Invalid file format');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            const generateCompletionEmail = (order, customer) => {
                const subject = `Service Complete - ${customer?.tailNumber || order.tailNumber} - Mustang Aviation`;
                
                let services = [];
                if (order.fuelType) {
                    services.push(`${order.fuelQuantity} gallons of ${order.fuelType}`);
                }
                if (order.hangarOvernight === 'yes') {
                    services.push(`Hangar overnight - Secured indoors`);
                } else if (order.hangarOvernight === 'no') {

        // === CALENDAR FEATURE START ===
        function CalendarView({ orders }) {
            const [calView, setCalView] = useState('month'); // 'month', 'week', 'day'
            const [current, setCurrent] = useState(new Date());

            const startOf = (d, unit) => {
                const dt = new Date(d);
                if (unit === 'month') { dt.setDate(1); dt.setHours(0,0,0,0); }
                if (unit === 'week') { const day = dt.getDay(); dt.setDate(dt.getDate() - day); dt.setHours(0,0,0,0); }
                if (unit === 'day') { dt.setHours(0,0,0,0); }
                return dt;
            };

            const isSameDay = (a, b) => {
                const da = new Date(a), db = new Date(b);
                return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
            };

            const navigate = (dir) => {
                const d = new Date(current);
                if (calView === 'month') d.setMonth(d.getMonth() + dir);
                if (calView === 'week') d.setDate(d.getDate() + dir * 7);
                if (calView === 'day') d.setDate(d.getDate() + dir);
                setCurrent(d);
            };

            // Build events from orders: arrival = createdAt, departure = departureDate
            const getEvents = (date) => {
                const events = [];
                orders.forEach(o => {
                    const tail = o.tailNumber || o.aircraft || '?';
                    const customer = o.customerName || o.pilotName || '';
                    if (o.createdAt && isSameDay(o.createdAt, date)) {
                        events.push({ type: 'arrival', tail, customer, time: new Date(o.createdAt), order: o });
                    }
                    if (o.departureDate && isSameDay(o.departureDate, date)) {
                        const depTime = o.departureTime
                            ? (() => { const d = new Date(o.departureDate); const [h,m] = o.departureTime.split(':'); d.setHours(+h,+m); return d; })()
                            : new Date(o.departureDate);
                        events.push({ type: 'departure', tail, customer, time: depTime, order: o });
                    }
                });
                return events.sort((a,b) => a.time - b.time);
            };

            const EventPill = ({ ev }) => (
                <div className={`text-xs px-1.5 py-0.5 rounded font-semibold truncate mb-0.5 ${
                    ev.type === 'arrival'
                    ? 'bg-green-100 text-green-800 border border-green-300'
                    : 'bg-blue-100 text-blue-800 border border-blue-300'
                }`} title={`${ev.type === 'arrival' ? '✈️ ARR' : '🛫 DEP'} ${ev.tail} ${ev.customer} ${ev.time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`}>
                    {ev.type === 'arrival' ? '↓' : '↑'} {ev.tail}
                </div>
            );

            // ---- MONTH VIEW ----
            const MonthView = () => {
                const monthStart = startOf(current, 'month');
                const monthEnd = new Date(current.getFullYear(), current.getMonth()+1, 0);
                const startPad = monthStart.getDay();
                const days = [];
                for (let i = 0; i < startPad; i++) days.push(null);
                for (let d = 1; d <= monthEnd.getDate(); d++) days.push(new Date(current.getFullYear(), current.getMonth(), d));
                const today = new Date();
                return (
                    <div>
                        <div className="grid grid-cols-7 mb-1">
                            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
                                <div key={d} className="text-center text-xs font-bold text-gray-500 py-2">{d}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {days.map((day, i) => {
                                if (!day) return <div key={`pad-${i}`} />;
                                const evs = getEvents(day);
                                const isToday = isSameDay(day, today);
                                return (
                                    <div key={day.toISOString()} className={`min-h-20 rounded-lg p-1.5 border ${isToday ? 'border-red-500 bg-red-50' : 'border-gray-200 bg-white'} cursor-pointer hover:shadow-md transition`}
                                        onClick={() => { setCurrent(day); setCalView('day'); }}>
                                        <div className={`text-xs font-bold mb-1 ${isToday ? 'text-red-600' : 'text-gray-700'}`}>{day.getDate()}</div>
                                        {evs.slice(0,3).map((ev,j) => <EventPill key={j} ev={ev} />)}
                                        {evs.length > 3 && <div className="text-xs text-gray-400">+{evs.length-3} more</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            // ---- WEEK VIEW ----
            const WeekView = () => {
                const weekStart = startOf(current, 'week');
                const days = Array.from({length:7}, (_,i) => { const d = new Date(weekStart); d.setDate(d.getDate()+i); return d; });
                const today = new Date();
                return (
                    <div className="grid grid-cols-7 gap-1">
                        {days.map(day => {
                            const evs = getEvents(day);
                            const isToday = isSameDay(day, today);
                            return (
                                <div key={day.toISOString()} className={`rounded-lg border ${isToday ? 'border-red-500 bg-red-50' : 'border-gray-200 bg-white'} overflow-hidden`}>
                                    <div className={`text-center text-xs font-bold py-2 ${isToday ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                        {day.toLocaleDateString([],{weekday:'short'})}<br/>
                                        <span className="text-lg">{day.getDate()}</span>
                                    </div>
                                    <div className="p-1 min-h-32">
                                        {evs.length === 0 && <div className="text-xs text-gray-300 text-center mt-4">—</div>}
                                        {evs.map((ev,j) => (

                    fuelQuantity: fuelQuantity || order.fuelQuantity,
                    message: `Fueling complete: ${fuelQuantity || order.fuelQuantity} gal ${order.fuelType}${notes ? ' - ' + notes : ''}`,
                    submittedBy: 'Line Service',
                    notes: notes
                });

                alert('Front desk notified!');
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-md w-full">
                        <div className="p-6">
                            <h3 className="text-2xl font-bold mb-4 text-gray-800">⚡ Quick Fuel Entry</h3>
                            <p className="text-gray-600 mb-6">Notify front desk that fueling is complete</p>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Select Aircraft *
                                    </label>
                                    <select
                                        value={selectedOrder}
                                        onChange={(e) => {
                                            setSelectedOrder(e.target.value);
                                            const order = orders.find(o => o.id === e.target.value);
                                            if (order) setFuelQuantity(order.fuelQuantity || '');
                                        }}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent text-lg"
                                        required
                                    >
                                        <option value="">Choose aircraft...</option>
                                        {activeOrders.map(order => {
                                            const customer = customers.find(c => c.id === order.customerId);
                                            return (
                                                <option key={order.id} value={order.id}>
                                                    {customer?.tailNumber} - {order.fuelType}
                                                </option>
                                            );
                                        })}
                                    </select>
                                    {activeOrders.length === 0 && (
                                        <p className="text-sm text-gray-500 mt-2">No active fuel orders</p>
                                    )}
                                </div>

                                {selectedOrder && (
                                    <>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Fuel Quantity (gallons) *
                                            </label>
                                            <input
                                                type="number"
                                                value={fuelQuantity}
                                                onChange={(e) => setFuelQuantity(e.target.value)}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent text-lg"
                                                placeholder="Enter gallons"
                                                required
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Notes (optional)
                                            </label>
                                            <textarea
                                                value={notes}
                                                onChange={(e) => setNotes(e.target.value)}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent text-lg"
                                                rows="2"
                                                placeholder="Any issues or special notes..."
                                            />
                                        </div>
                                    </>
                                )}

                                <div className="flex gap-3 pt-4">
                                    <button
                                        type="submit"
                                        disabled={!selectedOrder}
                                        className="flex-1 mustang-red mustang-red-hover text-white px-6 py-4 rounded-lg font-bold text-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        📢 Notify Front Desk
                                    </button>
                                    <button
                                        type="button"
                                        onClick={onClose}
                                        className="px-6 py-4 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-medium transition"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<FBOSystem />, document.getElementById('root'));
    </script>
</body>
</html>
